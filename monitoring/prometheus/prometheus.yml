global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'service_monitor_backend'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['service-monitor-backend:8081']
