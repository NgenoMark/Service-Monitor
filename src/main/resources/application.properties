spring.application.name=Service_Monitor
server.port=8081

management.endpoints.web.exposure.include=health,prometheus,metrics,info
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# PostgreSQL connection (override via env vars in Docker Compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/service_monitor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:service_monitor_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:service_monitor_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
